<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - McCrack</title>
  <link rel="icon" href="https://example.com" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-row">
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="games.html" class="">Games</a>
          <a href="movies.html" class="">Movies</a>
          <a href="chat.html" class="active">Chat</a>
          <a href="proxies.html" class="">Proxies</a>
          <a href="bypass.html" class="">Bypass</a>
          <a href="more.html" class="">More</a>
          <a href="browser.html">Browser</a>
          <a href="mccrackos.html">McCrackOS</a>
        </nav>
        <a class="settings-link" href="settings.html" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <main>
      <section class="hero hero-compact">
        <h1>Chat</h1>
      </section>

      <div class="embed-launcher-wrap">
        <div id="loader" class="embed-loader">
          <div class="embed-spinner"></div>
          <p>Loading chat…</p>
        </div>

        <iframe id="gameFrame"
                class="embed-frame"
                src="https://patrickmango49.github.io/McCrack-Chat/"
                allowfullscreen>
        </iframe>
      </div>

      <button onclick="openFullscreen()" class="media-launcher-fullscreen" type="button">
        Fullscreen
      </button>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    setTimeout(() => {
      const l = document.getElementById('loader');
      l.style.transition = 'opacity .5s ease';
      l.style.opacity = '0';
      setTimeout(() => l.remove(), 500);
    }, 4000);

    async function openFullscreen() {
      const target = document.querySelector('.embed-launcher-wrap');
      if (!document.fullscreenElement) {
        if (target.requestFullscreen) {
          await target.requestFullscreen();
        }
      } else {
        await document.exitFullscreen();
      }
    }
  </script>
</body>
</html>
