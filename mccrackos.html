  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-row">
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="games.html" class="">Games</a>
          <a href="movies.html" class="">Movies</a>
          <a href="chat.html" class="">Chat</a>
          <a href="proxies.html" class="">Proxies</a>
          <a href="apps.html" class="">Apps</a>
          <a href="browser.html">Browser</a>
          <a href="mccrackos.html" class="active">𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</a>
          <a href="more.html" class="">More</a>
        </nav>
        <a class="settings-link" href="settings.html" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <main class="embed-main">
      <section class="hero hero-compact">
        <h1>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</h1>
      </section>

      <div class="embed-launcher-wrap">
        <div id="loader" class="embed-loader">
          <div class="embed-spinner"></div>
          <p>Loading 𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS…</p>
        </div>

        <iframe id="gameFrame"
                class="embed-frame"
                src="https://patrickmango49.github.io/McCrackOS/"
                allowfullscreen>
        </iframe>
      </div>

      <button onclick="openFullscreen()" class="media-launcher-fullscreen" type="button">
        Fullscreen
      </button>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    setTimeout(() => {
      const l = document.getElementById('loader');
      l.style.transition = 'opacity .5s ease';
      l.style.opacity = '0';
      setTimeout(() => l.remove(), 500);
    }, 4000);

    async function openFullscreen() {
      const target = document.documentElement;
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        return;
      }

      if (target.requestFullscreen) {
        await target.requestFullscreen();
      } else if (target.webkitRequestFullscreen) {
        target.webkitRequestFullscreen();
      }
    }

    document.addEventListener('keydown', async (event) => {
      if (event.key !== 'Escape') return;
      if (!(document.fullscreenElement || document.webkitFullscreenElement)) return;
      if (document.exitFullscreen) {
        await document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    });
  </script>
</body>
</html>
