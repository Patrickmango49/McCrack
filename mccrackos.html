<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS - 𝕄𝕔ℂ𝕣𝕒𝕔𝕜</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css?v=1.1.0" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-row">
        <nav class="nav" aria-label="Primary">
          <a href="/">Home</a>
          <a href="/games" class="">Games</a>
          <a href="/movies" class="">Movies</a>
          <a href="/chat" class="">Chat</a>
          <a href="/apps" class="">Apps</a>
          <a href="/browser">Browser</a>
          <a href="/mccrackos" class="active">𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</a>
          <a href="/more" class="">More</a>
        </nav>
        <a class="settings-link" href="/settings" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <main class="embed-main">
      <div id="getStartedScreen" class="embed-get-started-screen">
        <button id="getStartedButton" class="embed-get-started-button" type="button">Get Started</button>
        <p><em>Press Enter twice to skip boot screen</em></p>
      </div>
      <div class="embed-launcher-wrap">
        <div id="loader" class="embed-loader">
          <div class="embed-spinner"></div>
          <p>Loading 𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS…</p>
        </div>

        <iframe id="gameFrame"
                class="embed-frame"
                src="about:blank"
                allowfullscreen>
        </iframe>
      </div>

      <button onclick="openFullscreen()" class="media-launcher-fullscreen" type="button">
        Fullscreen
      </button>
    </main>
  </div>
  <script src="app.js?v=1.1.0"></script>
  <script>
    const BOOT_URL = 'https://patrickmango49.github.io/McCrackOS/';
    const loader = document.getElementById('loader');
    const frame = document.getElementById('gameFrame');
    const getStartedScreen = document.getElementById('getStartedScreen');
    const getStartedButton = document.getElementById('getStartedButton');
    let bootStartTimer = null;
    let enterPressCount = 0;
    let enterPressResetTimer = null;

    function hideLoaderImmediately() {
      if (!loader) return;
      loader.style.transition = 'opacity .25s ease';
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 250);
    }

    function startBootSequence() {
      if (bootStartTimer) return;
      getStartedScreen?.classList.add('is-hidden');
      frame.src = BOOT_URL;
      bootStartTimer = setTimeout(hideLoaderImmediately, 4000);
    }

    getStartedButton?.addEventListener('click', startBootSequence);

    async function openFullscreen() {
      const target = document.documentElement;
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        return;
      }

      if (target.requestFullscreen) {
        await target.requestFullscreen();
      } else if (target.webkitRequestFullscreen) {
        target.webkitRequestFullscreen();
      }
    }

    document.addEventListener('keydown', async (event) => {
      if (event.key === 'Enter') {
        enterPressCount += 1;
        clearTimeout(enterPressResetTimer);
        enterPressResetTimer = setTimeout(() => {
          enterPressCount = 0;
        }, 900);

        if (enterPressCount >= 2) {
          startBootSequence();
          if (bootStartTimer) {
            clearTimeout(bootStartTimer);
            bootStartTimer = null;
          }
          hideLoaderImmediately();
          enterPressCount = 0;
        }
      }

      if (event.key !== 'Escape') return;
      if (!(document.fullscreenElement || document.webkitFullscreenElement)) return;
      if (document.exitFullscreen) {
        await document.exitFullscreen();
      } else if (document.webkitExitFullscreen) {
        document.webkitExitFullscreen();
      }
    });
  </script>
</body>
</html>
