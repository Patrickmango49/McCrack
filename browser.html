<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser - 𝕄𝕔ℂ𝕣𝕒𝕔𝕜</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-row">
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="games.html" class="">Games</a>
          <a href="movies.html" class="">Movies</a>
          <a href="chat.html" class="">Chat</a>
          <a href="proxies.html" class="">Proxies</a>
          <a href="apps.html" class="">Apps</a>
          <a href="browser.html" class="active">Browser</a>
          <a href="mccrackos.html">𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</a>
          <a href="more.html" class="">More</a>
        </nav>
        <a class="settings-link" href="settings.html" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <main class="embed-main">
      <section class="hero hero-compact">
        <h1>Browser</h1>
      </section>

      <div class="embed-launcher-wrap">
        <div id="loader" class="embed-loader">
          <div class="embed-spinner"></div>
          <p>Loading browser…</p>
        </div>

        <iframe id="gameFrame"
                class="embed-frame"
                src="https://patrickmango49.github.io/McCrack-Browser/"
                allowfullscreen>
        </iframe>
      </div>

      <button onclick="openFullscreen()" class="media-launcher-fullscreen" type="button">
        Fullscreen
      </button>
    </main>
  </div>
  <script src="app.js"></script>
  <script>
    setTimeout(() => {
      const l = document.getElementById('loader');
      l.style.transition = 'opacity .5s ease';
      l.style.opacity = '0';
      setTimeout(() => l.remove(), 500);
    }, 4000);

    async function openFullscreen() {
      const target = document.querySelector('.embed-launcher-wrap');
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        if (document.exitFullscreen) {
          await document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
        return;
      }

      target.classList.add('is-pre-fullscreen');
      await new Promise((resolve) => window.requestAnimationFrame(resolve));

      try {
        if (target.requestFullscreen) {
          await target.requestFullscreen();
        } else if (target.webkitRequestFullscreen) {
          target.webkitRequestFullscreen();
        }
      } finally {
        window.setTimeout(() => {
          target.classList.remove('is-pre-fullscreen');
        }, 250);
      }
    }

    function clearPreFullscreen() {
      document.querySelector('.embed-launcher-wrap')?.classList.remove('is-pre-fullscreen');
    }

    document.addEventListener('fullscreenchange', clearPreFullscreen);
    document.addEventListener('webkitfullscreenchange', clearPreFullscreen);
  </script>
</body>
</html>
