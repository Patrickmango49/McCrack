<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Style App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  position: sticky;
  top: 0;
  z-index: 10;
}

header h1 {
  margin: 0;
  font-size: 24px;
}

#search {
  padding: 8px;
  border-radius: 5px;
  border: none;
  outline: none;
}

.section {
  padding: 20px;
}

.row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
}

.card {
  min-width: 140px;
  height: 210px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card:hover {
  transform: scale(1.15);
}

#playerContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#player {
  width: 85%;
  height: 75%;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1>NETFLIX+</h1>
  <input id="search" placeholder="Search movies..." />
</header>

<div class="section">
  <h2>🔥 Trending</h2>
  <div class="row" id="trending"></div>
</div>

<div class="section">
  <h2>🔍 Results</h2>
  <div class="row" id="results"></div>
</div>

<div id="playerContainer">
  <iframe id="player" frameborder="0" allowfullscreen></iframe>
  <button onclick="closePlayer()">Close</button>
</div>

<script>
const API_KEY = "YOUR_TMDB_API_KEY";
const IMG = "https://image.tmdb.org/t/p/w500";

const trendingRow = document.getElementById("trending");
const resultsRow = document.getElementById("results");
const player = document.getElementById("player");
const container = document.getElementById("playerContainer");

function createCard(movie) {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `<img src="${IMG + movie.poster_path}" />`;

  card.onclick = () => {
    player.src = `https://vidsrc-embed.ru/embed/movie?tmdb=${movie.id}`;
    container.style.display = "flex";
  };

  return card;
}

// LOAD TRENDING
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
  .then(res => res.json())
  .then(data => {
    data.results.forEach(m => {
      if (m.poster_path) trendingRow.appendChild(createCard(m));
    });
  });

// SEARCH BY NAME

document.getElementById("search").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    const query = e.target.value;
    resultsRow.innerHTML = "";

    fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}`)
      .then(res => res.json())
      .then(data => {
        data.results.forEach(m => {
          if (m.poster_path) resultsRow.appendChild(createCard(m));
        });
      });
  }
});

function closePlayer() {
  player.src = "";
  container.style.display = "none";
}
</script>

</body>
</html>
