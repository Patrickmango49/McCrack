<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Hub Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #000, #111, #000);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
}

header h1 {
  margin: 0;
}

#search {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.section {
  padding: 20px;
}

.row {
  display: flex;
  gap: 15px;
  overflow-x: auto;
}

.card {
  min-width: 160px;
  height: 240px;
  background: #222;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  cursor: pointer;
  transition: transform 0.25s, background 0.25s;
  position: relative;
  padding: 10px;
}

.card:hover {
  transform: scale(1.12);
  background: #333;
}

.card span {
  font-size: 14px;
}

#playerContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  z-index: 999;
}

#player {
  width: 85%;
  height: 75%;
  border-radius: 10px;
}

.controls {
  margin-top: 10px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: white;
  color: black;
}

button:hover {
  opacity: 0.8;
}
</style>
</head>
<body>

<header>
  <h1>🎬 Movie Hub</h1>
  <input id="search" placeholder="Search (IMDB ID e.g. tt123...)" />
</header>

<div class="section">
  <h2>🔥 Latest Movies</h2>
  <div class="row" id="movies"></div>
</div>

<div class="section">
  <h2>📺 Latest TV Shows</h2>
  <div class="row" id="tv"></div>
</div>

<div id="playerContainer">
  <iframe id="player" frameborder="0" allowfullscreen></iframe>
  <div class="controls">
    <button id="closeBtn">Close</button>
    <button onclick="toggleAutoplay()">Toggle Autoplay</button>
  </div>
</div>

<script>
const movieRow = document.getElementById("movies");
const tvRow = document.getElementById("tv");
const player = document.getElementById("player");
const container = document.getElementById("playerContainer");

let autoplay = 1;

function createCard(title, imdb) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `<span>${title}</span>`;

  card.onclick = () => {
    player.src = `https://vidsrc-embed.ru/embed/movie/${imdb}?autoplay=${autoplay}`;
    container.style.display = "flex";
  };

  return card;
}

// LOAD MOVIES
fetch("https://vidsrc-embed.ru/movies/latest/page-1.json")
  .then(res => res.json())
  .then(data => {
    data.result.forEach(m => {
      movieRow.appendChild(createCard(m.title, m.imdb_id));
    });
  });

// LOAD TV
fetch("https://vidsrc-embed.ru/tvshows/latest/page-1.json")
  .then(res => res.json())
  .then(data => {
    data.result.forEach(show => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<span>${show.title}</span>`;

      card.onclick = () => {
        player.src = `https://vidsrc-embed.ru/embed/tv/${show.imdb_id}`;
        container.style.display = "flex";
      };

      tvRow.appendChild(card);
    });
  });

// SEARCH (IMDB ID DIRECT)
document.getElementById("search").addEventListener("keypress", e => {
  if (e.key === "Enter") {
    const id = e.target.value.trim();
    if (id.startsWith("tt")) {
      player.src = `https://vidsrc-embed.ru/embed/movie/${id}`;
      container.style.display = "flex";
    }
  }
});

// CONTROLS
function toggleAutoplay() {
  autoplay = autoplay === 1 ? 0 : 1;
  alert("Autoplay: " + (autoplay ? "ON" : "OFF"));
}

document.getElementById("closeBtn").onclick = () => {
  player.src = "";
  container.style.display = "none";
};
</script>

</body>
</html>
