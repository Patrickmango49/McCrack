<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CinemaFlow</title>
<style>
  :root {
    --bg: #06070c;
    --panel: #121522;
    --panel-2: #1a1f32;
    --text: #f3f4f8;
    --muted: #9aa3b2;
    --brand: #6d7cff;
    --brand-2: #55e6c1;
    --danger: #ff6b7d;
    --shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 700px at 90% -20%, rgba(109, 124, 255, 0.25), transparent 50%),
      radial-gradient(900px 650px at -10% 20%, rgba(85, 230, 193, 0.16), transparent 45%),
      var(--bg);
  }

  .app {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px;
  }

  .topbar {
    position: sticky;
    top: 14px;
    z-index: 20;
    display: flex;
    gap: 14px;
    align-items: center;
    padding: 14px;
    border-radius: var(--radius);
    background: rgba(18, 21, 34, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow);
  }

  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-right: auto;
  }

  .logo span {
    color: var(--brand-2);
  }

  .searchWrap {
    position: relative;
    flex: 1;
    max-width: 620px;
  }

  #search {
    width: 100%;
    padding: 13px 46px 13px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(0, 0, 0, 0.25);
    color: var(--text);
    outline: none;
    transition: 0.2s ease;
  }

  #search:focus {
    border-color: rgba(109, 124, 255, 0.8);
    box-shadow: 0 0 0 3px rgba(109, 124, 255, 0.2);
  }

  #searchBtn {
    position: absolute;
    right: 6px;
    top: 6px;
    bottom: 6px;
    border: 0;
    border-radius: 10px;
    padding: 0 14px;
    color: #071010;
    background: linear-gradient(135deg, var(--brand-2), #78ffd9);
    font-weight: 700;
    cursor: pointer;
  }

  .hint {
    color: var(--muted);
    font-size: 0.88rem;
    margin: 12px 3px 22px;
  }

  .section {
    margin: 26px 0;
  }

  .section h2 {
    margin: 0 0 10px;
    font-size: 1.2rem;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
  }

  .card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: var(--panel);
    transform: translateY(0);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.18);
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 26px rgba(0, 0, 0, 0.4);
  }

  .poster {
    width: 100%;
    aspect-ratio: 2 / 3;
    object-fit: cover;
    display: block;
    background: #0d111a;
  }

  .meta {
    padding: 10px;
    background: linear-gradient(180deg, rgba(26, 31, 50, 0.7), var(--panel-2));
  }

  .title {
    font-size: 0.95rem;
    font-weight: 700;
    margin: 0;
    line-height: 1.3;
  }

  .sub {
    margin-top: 5px;
    color: var(--muted);
    font-size: 0.82rem;
  }

  .status {
    margin: 12px 2px 0;
    color: var(--muted);
    font-size: 0.95rem;
  }

  #playerContainer {
    position: fixed;
    inset: 0;
    background: rgba(3, 5, 12, 0.9);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 999;
    padding: 20px;
  }

  #player {
    width: min(1100px, 96vw);
    aspect-ratio: 16 / 9;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    box-shadow: var(--shadow);
    background: #000;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  button {
    border: 0;
    border-radius: 11px;
    padding: 10px 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .closeBtn {
    background: linear-gradient(135deg, #ff8b98, var(--danger));
    color: white;
  }

  .ghostBtn {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  @media (max-width: 760px) {
    .topbar {
      flex-wrap: wrap;
    }

    .logo {
      width: 100%;
    }

    #searchBtn {
      padding: 0 10px;
    }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="logo">Cinema<span>Flow</span></div>
      <div class="searchWrap">
        <input id="search" placeholder="Search any movie title..." />
        <button id="searchBtn" title="Search">Go</button>
      </div>
    </header>

    <p class="hint">No API key needed. Press <strong>Enter</strong> or click <strong>Go</strong> to search.</p>

    <section class="section">
      <h2>🔥 Popular Now</h2>
      <div class="row" id="trending"></div>
      <p id="trendingStatus" class="status"></p>
    </section>

    <section class="section">
      <h2>🔎 Search Results</h2>
      <div class="row" id="results"></div>
      <p id="resultsStatus" class="status">Start by searching for a movie.</p>
    </section>
  </main>

  <div id="playerContainer">
    <iframe id="player" frameborder="0" allowfullscreen referrerpolicy="origin"></iframe>
    <div class="controls">
      <button class="closeBtn" onclick="closePlayer()">Close</button>
      <button class="ghostBtn" onclick="openInTab()">Open in New Tab</button>
    </div>
  </div>

<script>
  const API_BASE = "https://yts.mx/api/v2";
  const trendingRow = document.getElementById("trending");
  const resultsRow = document.getElementById("results");
  const searchInput = document.getElementById("search");
  const searchBtn = document.getElementById("searchBtn");
  const trendingStatus = document.getElementById("trendingStatus");
  const resultsStatus = document.getElementById("resultsStatus");

  const player = document.getElementById("player");
  const container = document.getElementById("playerContainer");
  let currentEmbedUrl = "";

  function safeText(value, fallback = "Unknown") {
    if (value === null || value === undefined || value === "") return fallback;
    return String(value);
  }

  function createCard(movie) {
    const card = document.createElement("article");
    card.className = "card";

    const title = safeText(movie.title, "Untitled");
    const year = safeText(movie.year, "—");
    const rating = movie.rating ? `${movie.rating}/10` : "No rating";
    const image = movie.large_cover_image || movie.medium_cover_image || "";

    card.innerHTML = `
      <img class="poster" src="${image}" alt="${title} poster" loading="lazy" />
      <div class="meta">
        <p class="title">${title}</p>
        <div class="sub">${year} • ⭐ ${rating}</div>
      </div>
    `;

    card.onclick = () => {
      if (!movie.imdb_code) {
        alert("Sorry, this title does not have a playable source yet.");
        return;
      }
      currentEmbedUrl = `https://vidsrc.to/embed/movie/${movie.imdb_code}`;
      player.src = currentEmbedUrl;
      container.style.display = "flex";
    };

    return card;
  }

  function renderMovies(target, movies) {
    target.innerHTML = "";
    movies.forEach((movie) => {
      if ((movie.large_cover_image || movie.medium_cover_image) && movie.title) {
        target.appendChild(createCard(movie));
      }
    });
  }

  async function fetchMovies(url, statusEl, emptyMsg) {
    statusEl.textContent = "Loading...";
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Network error (${res.status})`);
      const data = await res.json();
      const movies = data?.data?.movies || [];
      statusEl.textContent = movies.length ? "" : emptyMsg;
      return movies;
    } catch (error) {
      statusEl.textContent = `Could not load movies: ${error.message}`;
      return [];
    }
  }

  async function loadTrending() {
    const movies = await fetchMovies(
      `${API_BASE}/list_movies.json?sort_by=like_count&limit=24`,
      trendingStatus,
      "No trending movies found right now."
    );
    renderMovies(trendingRow, movies);
  }

  async function searchMovies() {
    const query = searchInput.value.trim();
    if (!query) {
      resultsStatus.textContent = "Type a movie name to search.";
      resultsRow.innerHTML = "";
      return;
    }

    const url = `${API_BASE}/list_movies.json?query_term=${encodeURIComponent(query)}&limit=24`;
    const movies = await fetchMovies(url, resultsStatus, `No results found for “${query}”.`);
    renderMovies(resultsRow, movies);
  }

  function closePlayer() {
    player.src = "";
    currentEmbedUrl = "";
    container.style.display = "none";
  }

  function openInTab() {
    if (!currentEmbedUrl) return;
    window.open(currentEmbedUrl, "_blank", "noopener,noreferrer");
  }

  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") searchMovies();
  });

  searchBtn.addEventListener("click", searchMovies);

  container.addEventListener("click", (e) => {
    if (e.target === container) closePlayer();
  });

  loadTrending();
</script>
</body>
</html>
