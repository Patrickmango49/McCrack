<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - 𝕄𝕔ℂ𝕣𝕒𝕔𝕜</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="favicon.png" />
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-row">
        <nav class="nav" aria-label="Primary">
          <a href="index.html">Home</a>
          <a href="games.html">Games</a>
          <a href="movies.html">Movies</a>
          <a href="chat.html">Chat</a>
          <a href="proxies.html">Proxies</a>
          <a href="apps.html">Apps</a>
          <a href="browser.html">Browser</a>
          <a href="mccrackos.html">𝕄𝕔ℂ𝕣𝕒𝕔𝕜OS</a>
          <a href="more.html">More</a>
        </nav>
        <a class="settings-link active" href="settings.html" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <main>
      <section class="hero">
        <h1>Settings</h1>
        <p>Customize tab name, favicon, tab cloak, and wallpaper presets.</p>
      </section>

      <section class="grid">
        <article class="card">
          <h3>Tab Name</h3>
          <input id="tabName" class="input" placeholder="Tab name" />
          <button id="saveTab" class="btn">Save Tab Name</button>
        </article>

        <article class="card">
          <h3>Favicon by URL</h3>
          <input id="faviconUrl" class="input" placeholder="https://example.com/favicon.ico" />
          <button id="saveFaviconUrl" class="btn">Save Favicon URL</button>
          <p class="small">Default link is favicon.png.</p>
        </article>

        <article class="card">
          <h3>Favicon Upload</h3>
          <input id="faviconUpload" class="input" type="file" accept="image/*" />
          <button id="saveFaviconUpload" class="btn">Use Uploaded Favicon</button>
        </article>

        <article class="card">
          <h3>Tab Cloak</h3>
          <button id="applyCloak" class="btn">Apply Default Cloak</button>
          <button id="resetCloak" class="btn">Reset to Site Default</button>
          <p class="small" id="cloakInfo"></p>
        </article>

        <article class="card">
          <h3>Wallpaper Preset</h3>
          <select id="presetSelect">
            <option value="linear-gradient(170deg, #050505 0%, #1a1a1a 35%, #7d7d7d 70%, #dadada 100%)">Default Gradient</option>
            <option value="linear-gradient(170deg, #0f172a 0%, #1d4ed8 45%, #38bdf8 100%)">Ocean Blue</option>
            <option value="linear-gradient(170deg, #1f1147 0%, #6d28d9 45%, #f472b6 100%)">Neon Purple</option>
            <option value="linear-gradient(170deg, #052e16 0%, #15803d 45%, #a3e635 100%)">Forest Glow</option>
            <option value="linear-gradient(170deg, #3f1d0f 0%, #ea580c 45%, #facc15 100%)">Sunset Warmth</option>
          </select>
          <button id="savePreset" class="btn">Apply Preset</button>
        </article>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    // Edit these two values in code to set your default cloak.
    const DEFAULT_CLOAK_TITLE = 'Google';
    const DEFAULT_CLOAK_FAVICON = 'https://www.google.com/favicon.ico';

    const defaults = window.mcApp.defaults;
    const tabName = document.getElementById('tabName');
    const faviconUrl = document.getElementById('faviconUrl');
    const cloakInfo = document.getElementById('cloakInfo');

    tabName.value = localStorage.getItem('mc_tab_name') || defaults.DEFAULT_TITLE;
    faviconUrl.value = localStorage.getItem('mc_favicon_url') || defaults.DEFAULT_FAVICON;
    cloakInfo.textContent = `Current default cloak: ${DEFAULT_CLOAK_TITLE} | ${DEFAULT_CLOAK_FAVICON}`;

    document.getElementById('saveTab').addEventListener('click', () => {
      localStorage.setItem('mc_tab_name', tabName.value.trim() || defaults.DEFAULT_TITLE);
      window.mcApp.applySettings();
    });

    document.getElementById('saveFaviconUrl').addEventListener('click', () => {
      localStorage.setItem('mc_favicon_url', faviconUrl.value.trim() || defaults.DEFAULT_FAVICON);
      window.mcApp.applySettings();
    });

    document.getElementById('saveFaviconUpload').addEventListener('click', () => {
      const file = document.getElementById('faviconUpload').files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        localStorage.setItem('mc_favicon_url', String(reader.result));
        window.mcApp.applySettings();
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('applyCloak').addEventListener('click', () => {
      localStorage.setItem('mc_tab_name', DEFAULT_CLOAK_TITLE);
      localStorage.setItem('mc_favicon_url', DEFAULT_CLOAK_FAVICON);
      tabName.value = DEFAULT_CLOAK_TITLE;
      faviconUrl.value = DEFAULT_CLOAK_FAVICON;
      window.mcApp.applySettings();
    });

    document.getElementById('resetCloak').addEventListener('click', () => {
      localStorage.removeItem('mc_tab_name');
      localStorage.removeItem('mc_favicon_url');
      tabName.value = defaults.DEFAULT_TITLE;
      faviconUrl.value = defaults.DEFAULT_FAVICON;
      window.mcApp.applySettings();
    });

    document.getElementById('savePreset').addEventListener('click', () => {
      const selected = document.getElementById('presetSelect').value;
      localStorage.setItem('mc_wallpaper_type', 'gradient');
      localStorage.setItem('mc_wallpaper_value', selected);
      window.mcApp.applySettings();
    });
  </script>
</body>
</html>
