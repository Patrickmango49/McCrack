<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕄𝕔ℂ𝕣𝕒𝕔𝕜</title>
  <style>
    :root {
      --bg-1: #050505;
      --bg-2: #141414;
      --bg-3: #2a2a2a;
      --text: #f5f5f5;
      --muted: #cfcfcf;
      --glass: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.2);
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.14;
      background-image: radial-gradient(circle at 20% 20%, #ffffff14 0 2px, transparent 3px),
        radial-gradient(circle at 80% 60%, #ffffff10 0 2px, transparent 3px);
      background-size: 120px 120px, 140px 140px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), rgba(0, 0, 0, 0.35));
      backdrop-filter: blur(10px);
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .nav button {
      color: var(--text);
      background: var(--glass);
      border: 1px solid transparent;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav button:hover {
      border-color: var(--border);
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow);
    }

    main {
      flex: 1;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 36px 20px;
    }

    .hero {
      width: min(760px, 100%);
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 42px 24px 36px;
      box-shadow: var(--shadow);
    }

    .logo {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.5);
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      font-weight: 700;
      line-height: 1.06;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
      text-shadow: 0 8px 40px rgba(255, 255, 255, 0.18);
    }

    p {
      color: var(--muted);
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <header class="topbar">
    <nav class="nav" aria-label="Primary">
      <button type="button">Home</button>
      <button type="button">Games</button>
      <button type="button">Movies</button>
      <button type="button">Chat</button>
      <button type="button">Proxies</button>
      <button type="button">Bypass</button>
      <button type="button">More</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <img
        class="logo"
        src="https://lh3.googleusercontent.com/sitesv/APaQ0STJTV-xmb7PxaVVdAku6d6yMFZe_B-VxbAV7RZpaDcFrB_wGEmXJgYamvFgzrBoROMhwgqsK9fcaxtXAtyXhjaDDTAxPqLZevOuL642Mn0tKK_Ij9TG3jC8wDeElkF8pSIm10kQDtGEo_EjvlvVYFrgkdISVxFNADSG1_OouJB9l_qUrsB-ycB9D1I=w16383"
        alt="McCrack logo"
      />
      <h1>𝕄𝕔ℂ𝕣𝕒𝕔𝕜</h1>
      <p>Modern. Clean. Monochrome.</p>
    </section>
  </main>
</body>
</html>
